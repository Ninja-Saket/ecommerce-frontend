version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
        - VITE_REGISTER_REDIRECT_URL=${VITE_REGISTER_REDIRECT_URL}
        - VITE_FORGOT_PASSWORD_REDIRECT_URL=${VITE_FORGOT_PASSWORD_REDIRECT_URL}
        - VITE_APP_API=${VITE_APP_API}
        - VITE_APP_RAZORPAY_API_KEY=${VITE_APP_RAZORPAY_API_KEY}
    container_name: ecommerce-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - server_ecommerce-network

networks:
  server_ecommerce-network:
    external: true
